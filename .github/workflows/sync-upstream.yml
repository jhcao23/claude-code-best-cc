name: Sync Upstream

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync all branches and tags from upstream
        run: |
          git remote add upstream https://github.com/claude-code-best/claude-code.git
          git fetch upstream --tags

          # Sync branches
          for branch in $(git branch -r | grep 'upstream/' | grep -v 'HEAD' | sed 's|upstream/||'); do
            echo "Syncing branch: $branch"
            if git show-ref --verify --quiet "refs/heads/$branch"; then
              git checkout "$branch"
              git merge --ff-only "upstream/$branch" || echo "⚠️ $branch: can't fast-forward, skipping"
            else
              git checkout -b "$branch" "upstream/$branch"
            fi
            git push origin "$branch" || echo "⚠️ $branch: push failed, skipping"
          done

          # Sync tags
          git push origin --tags || echo "⚠️ tags: push failed, skipping"
